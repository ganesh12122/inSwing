# Docker Compose Setup for inSwing Development
# PostgreSQL + Redis for local development

version: '3.8'

services:
  # PostgreSQL 16 Database
  postgres:
    image: postgres:16-alpine
    container_name: inswing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inswing
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inswing_dev_password}
      POSTGRES_DB: inswing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inswing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inswing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7.0 Cache
  redis:
    image: redis:7.0-alpine
    container_name: inswing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - inswing-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  inswing-network:
    driver: bridge
