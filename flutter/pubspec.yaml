name: inswing
description: Real-time cricket scoring and tournament management platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # HTTP & Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # WebSocket
  socket_io_client: ^2.0.3+1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Utilities
  intl: ^0.18.1
  uuid: ^3.0.7
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  animations: ^2.0.8
  shimmer: ^3.0.0

  # Permissions
  permission_handler: ^11.0.1

  # Location
  geolocator: ^10.1.0

  # Camera (for profile pictures)
  camera: ^0.10.5+7
  image_picker: ^1.0.5

  # Connectivity
  connectivity_plus: ^5.0.1

  # Local Notifications (temporarily disabled due to compilation issues)
  # flutter_local_notifications: ^16.2.0

  # Firebase (Commented out for now - can be added later if needed)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.10
  # firebase_analytics: ^10.7.4

  # Platform specific
  flutter_web_plugins:
    sdk: flutter

  # Deep linking (temporarily removed - can be added later)
  # uni_links: ^0.5.1

  # Pull to refresh
  flutter_easyrefresh: ^2.2.2

  # Toast notifications
  fluttertoast: ^8.2.4

  # Loading indicators
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  # App icons
  # assets:
  #   - assets/images/
