version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: inswing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Ganesh@15
      MYSQL_DATABASE: inswing
      MYSQL_USER: inswing
      MYSQL_PASSWORD: inswing_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - inswing-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: inswing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - inswing-network

  # Backend API
  backend:
    build: .
    container_name: inswing-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://inswing:inswing_password@mysql:3306/inswing
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-super-secret-jwt-key-change-this-in-production
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8080", "https://inswing.app"]'
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - inswing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: inswing-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - inswing-network

volumes:
  mysql_data:
  redis_data:

networks:
  inswing-network:
    driver: bridge