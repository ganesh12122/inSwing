version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: inswing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inswing
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inswing_dev_password}
      POSTGRES_DB: inswing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inswing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inswing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: inswing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - inswing-network

  # Backend API
  backend:
    build: .
    container_name: inswing-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://inswing:${DB_PASSWORD:-inswing_dev_password}@postgres:5432/inswing
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-CHANGE-THIS-TO-A-SECURE-RANDOM-KEY}
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8080", "https://inswing.app"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - inswing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:

networks:
  inswing-network:
    driver: bridge
